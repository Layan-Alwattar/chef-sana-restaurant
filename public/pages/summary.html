<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الشيف سنا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@400;600&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <nav>
    <a href="../index.html" data-i18n="home">Home</a>
    <a href="summary.html" data-i18n="summary">Summary</a>
    <a href="add.html" data-admin-only data-i18n="addMeal">Add Meal</a>
    <a href="admin.html" data-public-only data-i18n="admin">Admin</a>
    <a href="#" id="logout-link" data-admin-only data-i18n="logout">Logout</a>
    <span class="lang-switcher">
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </span>
  </nav>
  <div class="container">
    <h1 data-i18n="summaryHeading">Meal Summary</h1>
    <p data-i18n="summarySubtitle">Summary of meals grouped by tags.</p>
    <table class="summary-table">
      <thead>
        <tr>
          <th data-i18n="tag">Tag</th>
          <th data-i18n="totalMeals">Total Meals</th>
          <th data-i18n="avgSatisfaction">Avg Satisfaction</th>
        </tr>
      </thead>
      <tbody id="summary-body"></tbody>
    </table>
  </div>
  <footer data-i18n="footerShort">NutriSnap © 2025</footer>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/summary.js"></script>
  <script>
    const logout = document.getElementById("logout-link");
    if (logout) {
      logout.addEventListener("click", e => {
        e.preventDefault();
        logoutAdmin();
        applyAdminUi();
      });
    }
  </script>
</body>

</html>
