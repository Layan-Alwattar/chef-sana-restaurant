<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الشيف سنا</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@400;600&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <nav>
    <a href="../index.html" data-i18n="home">Home</a>
    <a href="summary.html" data-i18n="summary">Summary</a>
    <a href="add.html" data-admin-only data-i18n="addMeal">Add Meal</a>
    <a href="#" id="logout-link" data-auth-in data-i18n="logoutWord">Log out</a>
    <span class="lang-switcher">
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </span>
  </nav>

  <div class="container">
    <!-- Logged-out: login / signup -->
    <div id="auth-box" class="auth-box" style="display:none">
      <h1 id="auth-title" data-i18n="loginTitle">Log in</h1>
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" autocomplete="email" placeholder="Email" required />
        <input type="password" id="auth-password" autocomplete="current-password" placeholder="••••••••" required />
        <button type="submit" id="auth-submit" data-i18n="login">Log in</button>
        <p id="auth-msg" class="auth-msg"></p>
      </form>
      <p class="auth-toggle">
        <span id="auth-toggle-text" data-i18n="noAccountYet">Don't have an account?</span>
        <a href="#" id="auth-toggle-link" data-i18n="signup">Sign up</a>
      </p>
    </div>

    <!-- Logged-in: account + favorites -->
    <div id="account-box" style="display:none">
      <h1 data-i18n="myAccount">My Account</h1>
      <p class="account-meta"><span data-i18n="loggedInAs">Logged in as</span>:
        <strong id="account-email"></strong>
        <button id="account-logout" class="btn-secondary" data-i18n="logoutWord">Log out</button>
      </p>
      <h2 data-i18n="myFavorites">My Favorites</h2>
      <p id="fav-empty" data-i18n="noFavoritesYet">No favorites yet. Tap the heart on a meal to save it here.</p>
      <div id="fav-list"></div>
    </div>
  </div>

  <footer data-i18n="footerShort">2026، مطعم الشيف سنا — فَإِذَا طَعِمْتُمْ فَانتَشِرُوا</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/account.js"></script>
  <script>
    document.getElementById("logout-link").addEventListener("click", e => {
      e.preventDefault();
      signOutUser();
    });
  </script>
</body>

</html>
