<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الشيف سنا</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@400;600&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <nav>
    <a href="../index.html" data-i18n="home">Home</a>
    <a href="summary.html" data-i18n="summary">Summary</a>
    <a href="add.html" data-admin-only data-i18n="addMeal">Add Meal</a>
    <span class="lang-switcher">
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </span>
  </nav>
  <div class="container narrow">
    <h1 data-i18n="adminLoginTitle">Admin Access</h1>
    <p data-i18n="adminLoginSubtitle">Enter the admin key to manage meals.</p>
    <form id="admin-form" class="admin-form">
      <input type="password" id="admin-key" data-i18n-placeholder="accessKey" placeholder="Access key" required />
      <button type="submit" data-i18n="enter">Enter</button>
      <p id="admin-error" class="error hidden" data-i18n="invalidKey">Invalid key. Try again.</p>
    </form>
  </div>
  <footer data-i18n="footerShort">2026، مطعم الشيف سنا — فَإِذَا طَعِمْتُمْ فَانتَشِرُوا</footer>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // If unlocked via ?key=... (auth.js handled it), or already an admin, skip the form.
      if (isAdmin()) {
        window.location.href = "add.html";
        return;
      }
      document.getElementById("admin-form").addEventListener("submit", e => {
        e.preventDefault();
        const key = document.getElementById("admin-key").value;
        if (loginAdmin(key)) {
          window.location.href = "add.html";
        } else {
          document.getElementById("admin-error").classList.remove("hidden");
        }
      });
    });
  </script>
</body>

</html>
