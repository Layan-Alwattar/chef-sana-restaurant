<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الشيف سنا</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@400;600&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <nav>
    <a href="../index.html" data-i18n="home">Home</a>
    <a href="add.html" data-i18n="addMeal">Add Meal</a>
    <a href="summary.html" data-i18n="summary">Summary</a>
    <a href="account.html" data-i18n="myAccount">My Account</a>
    <a href="#" id="logout-link" data-i18n="logoutWord">Log out</a>
    <span class="lang-switcher">
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </span>
  </nav>
  <div class="container">
    <h1 id="page-title" data-i18n="pageTitleAdd">Add New Meal</h1>
    <form id="meal-form">
      <input type="hidden" id="meal-id" />
      <input type="text" id="title" data-i18n-placeholder="mealTitle" placeholder="Meal Title" required />
      <div class="tags-picker">
        <label class="picker-label" data-i18n="mealTags">Tags</label>
        <div class="tag-entry-row">
          <input type="text" id="tag-entry" data-i18n-placeholder="addTagHint"
            placeholder="Type a tag, then press + or Enter" />
          <button type="button" id="add-tag-btn" class="add-tag-btn" data-i18n-title="addTag" title="Add tag">+</button>
        </div>
        <div class="tag-chips" id="tag-chips"></div>
      </div>
      <input type="number" id="calories" data-i18n-placeholder="mealCalories" placeholder="Calories" />
      <textarea id="description" data-i18n-placeholder="mealDescription" placeholder="Meal Description"></textarea>
      <input type="number" id="satisfaction" data-i18n-placeholder="mealSatisfaction" placeholder="Satisfaction (1-5)"
        min="1" max="5" />
      <div class="image-picker" id="image-picker">
        <label class="picker-label" data-i18n="imagePickerTitle">Meal photo</label>
        <div class="picker-controls">
          <label class="file-button" for="image-file" data-i18n="imageUpload">Choose file</label>
          <input type="file" id="image-file" accept="image/*" hidden />
        </div>
        <p class="picker-hint" data-i18n="imagePasteHint">or paste an image with Ctrl + V</p>
        <input type="url" id="image-url" data-i18n-placeholder="imageOrUrl" placeholder="or paste an image URL" />
        <div class="image-preview-wrap" id="preview-wrap" hidden>
          <img id="image-preview" alt="" />
          <button type="button" id="image-remove" class="remove-img-btn" data-i18n="imageRemove">Remove image</button>
        </div>
        <input type="hidden" id="image" />
      </div>
      <button type="submit" data-i18n="saveMeal">Save Meal</button>
    </form>
  </div>
  <footer data-i18n="footerShort">2026، مطعم الشيف سنا — فَإِذَا طَعِمْتُمْ فَانتَشِرُوا</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/add.js"></script>
  <script>
    document.getElementById("logout-link").addEventListener("click", e => {
      e.preventDefault();
      signOutUser();
    });
  </script>
</body>

</html>
