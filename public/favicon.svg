<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lime peel (outer rim) -->
  <path d="M 4 22 A 28 28 0 0 0 60 22 Z"
        fill="#9ccc65" stroke="#558b2f" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Inner flesh -->
  <path d="M 9 22 A 23 23 0 0 0 55 22 Z" fill="#eef7d8" />
  <!-- Segment lines radiating from the flat top -->
  <g stroke="#aed581" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="32" y1="22" x2="13" y2="26" />
    <line x1="32" y1="22" x2="20" y2="40" />
    <line x1="32" y1="22" x2="32" y2="44" />
    <line x1="32" y1="22" x2="44" y2="40" />
    <line x1="32" y1="22" x2="51" y2="26" />
  </g>
  <!-- Center pith -->
  <circle cx="32" cy="22" r="1.8" fill="#9ccc65" />
  <!-- Subtle highlight on peel -->
  <path d="M 12 22 A 20 20 0 0 1 28 7" fill="none" stroke="#dcedc8" stroke-width="1.3" stroke-linecap="round" opacity="0.6" />
</svg>
