<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- ===== Chef hat (toque) ===== -->
  <g stroke="#4e7d22" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- crown + band silhouette -->
    <path d="M34 52 L34 45
             C26 46 21 40 24 33
             C26 28 32 28 35 31
             C36 23 45 20 49 25
             C53 18 63 19 65 26
             C71 24 78 29 76 36
             C81 39 80 48 72 47
             L62 46 L62 52 Z"
          fill="#ffffff" />
    <!-- band top line -->
    <path d="M34 46 H62" fill="none" />
    <!-- pleats -->
    <path d="M43 46 V52 M53 46 V52" fill="none" stroke-width="2" />
  </g>

  <!-- ===== Lime slice ===== -->
  <!-- peel (outer rim) -->
  <path d="M18 60 A30 30 0 0 0 78 60 Z"
        fill="#9ccc65" stroke="#558b2f" stroke-width="2.5" stroke-linejoin="round" />
  <!-- inner flesh -->
  <path d="M23 60 A25 25 0 0 0 73 60 Z" fill="#eef7d8" />
  <!-- segment lines radiating from the flat top -->
  <g stroke="#aed581" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="48" y1="60" x2="28" y2="64" />
    <line x1="48" y1="60" x2="36" y2="80" />
    <line x1="48" y1="60" x2="48" y2="84" />
    <line x1="48" y1="60" x2="60" y2="80" />
    <line x1="48" y1="60" x2="68" y2="64" />
  </g>
  <!-- center pith -->
  <circle cx="48" cy="60" r="1.8" fill="#9ccc65" />
</svg>
